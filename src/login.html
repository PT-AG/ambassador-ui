<template>
  <div class="container login">
    <div class="row">
      <div class="col-xs-12">
        <div class="panel panel-default panel-login">
          <div class="panel-body">
            <h2 class="form-title">Sign In</h2>
            <form>
              <div class.bind="usernameError ? 'form-group has-error' : 'form-group'">
                <label for="" class="control-label">Username</label>
                <input type="text" class="form-control" placeholder="Username" value.bind="username">
                 <small class="text-danger" show.bind="usernameError">
                    ${usernameError}
                  </small>
              </div>
              <div class.bind="passwordError ? 'form-group has-error' : 'form-group'">
                <label for="" class="control-label">Password</label>
                <input type="password" class="form-control" placeholder="Password" value.bind="password">
                 <small class="text-danger" show.bind="passwordError">
                    ${passwordError}
                  </small>
              </div>
              <div class="form-group">
                <label>
                  <input type="checkbox" value="remember-me"> Remember me
                </label>
              </div>
              <button type="button" class="btn btn-success btn-lg btn-block" click.delegate="login()" disabled.bind="disabledButton">Sign in</button>
              <div class="form-group" show.bind="generalError">
                <small class="text-danger" style="color:#ff0000; font-size:1.4rem; font-weight:700;">${generalError}</small>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>
