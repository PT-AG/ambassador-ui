<template>
    <h1 class="page-header">Detail Account</h1>
    <require from="./data-form"></require>
    <block>
        <data-form data.bind="data" error.bind="error" read-only="true"></data-form>
        <hr/>
        <div class="btn-group pull-right">
            <a click.delegate="list()" class='btn btn-default btn-sm'>Kembali</a>
            <a if.bind="!data.isLocked" click.delegate="edit()" class='btn btn-primary btn-sm'>Ubah</a>
            <a if.bind="!data.isLocked" click.delegate="delete()" class='btn btn-danger btn-sm'>Hapus</a>
            <a if.bind="data.isLocked" click.delegate="unlock()" class='btn btn-success btn-sm'>Buka Kunci</a>
        </div>
    </block>
</template>
