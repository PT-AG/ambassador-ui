<template>
    <au-input-form title.bind="title" with.bind="context" options.bind="formOptions">
        <div slot="actions" class="btn-group">
            <button class="btn btn-default" click.delegate="context.cancelCallback($event)"
                if.one-way="context.hasCancel">Kembali</button>
            <button class="btn btn-primary" click.delegate="context.editCallback($event)" show.bind="!isUsed"
                if.one-way="context.hasEdit">Ubah</button>
            <button class="btn btn-success" click.delegate="context.saveCallback($event)"
                if.one-way="context.hasSave">Simpan</button>
            <button class="btn btn-danger" click.delegate="context.deleteCallback($event)" show.bind="!isUsed"
                if.one-way="context.hasDelete">Hapus</button>
        </div>

        <au-textbox label="No Bon Pengeluaran" value.bind="data.ExpenditureNo" read-only="true"
            options.bind="controlOptions" if.bind="readOnly || isEdit">
        </au-textbox>

        <au-datepicker label="Tgl Pengeluaran" value.bind="data.ExpenditureDate" error.bind="error.ExpenditureDate"
            read-only.bind="readOnly" options.bind="controlOptions">
        </au-datepicker>

        <au-autocomplete label="No Bon DO Sisa" value.bind="selectedGLDO" read-only.bind="readOnly || isEdit"
            error.bind="error.DONo"
            loader.bind="garmentLeftoverWarehouseDeliveryOrderLoader" query.bind="gldoFilter" text.bind="gldoView"
            options.bind="controlOptions">
        </au-autocomplete>

        <au-textbox label="Tujuan Pengeluaran" value.bind="data.ExpenditureDestination" read-only.bind="true"
            options.bind="controlOptions">
        </au-textbox>

        <au-autocomplete label="Unit Tujuan" value.bind="selectedUnit" text.bind="unitView" read-only.bind="true"
            options.bind="controlOptions" show.bind="data.ExpenditureDestination == 'UNIT'"
            view-model.ref="selectedUnitViewModel">
        </au-autocomplete>

        <au-autocomplete label="Buyer" value.bind="selectedBuyer" text.bind="buyerView" read-only.bind="true"
            options.bind="controlOptions" show.bind="data.ExpenditureDestination == 'JUAL LOKAL'"
            view-model.ref="selectedBuyerViewModel">
        </au-autocomplete>

        <au-autocomplete label="No Nota Penjualan Lokal" value.bind="selectedSalesNote" text="noteNo"
            if.bind="data.ExpenditureDestination == 'JUAL LOKAL'" read-only.bind="true" options.bind="controlOptions">
        </au-autocomplete>

        <au-textbox label="Keterangan Lain-lain" placeholder="Masukkan Keterangan" value.bind="data.EtcRemark"
            error.bind="error.EtcRemark" read-only.bind="true" options.bind="controlOptions"
            show.bind="data.ExpenditureDestination == 'LAIN-LAIN'">
        </au-textbox>

        <au-multiline label="Keterangan" placeholder="Masukkan Keterangan" value.bind="data.Remark"
            read-only.bind="true" options.bind="controlOptions">
        </au-multiline>

        <au-textbox error.bind="error.ItemsCount" read-only.bind="true" show.bind="error.ItemsCount"
            options.bind="controlOptions">
        </au-textbox>

        <au-collection columns.bind="items.columns" items.bind="data.Items" errors.bind="error.Items"
            add.bind="items.onAdd" read-only.bind="true" options.bind="items.options"
            item-template="modules/inventory/garment-leftover-warehouse/expenditure/accessories/template/item">
        </au-collection>

    </au-input-form>
</template>
