<template>
    <au-input-form title.bind="title" with.bind="context" options.bind="formOptions">
        <div slot="actions" class="btn-group">
            <button class="btn btn-default" click.delegate="context.cancelCallback($event)"
                if.one-way="context.hasCancel">Kembali</button>
            <button class="btn btn-primary" click.delegate="context.editCallback($event)" show.bind="!isUsed"
                if.one-way="context.hasEdit">Ubah</button>
            <button class="btn btn-success" click.delegate="context.saveCallback($event)"
                if.one-way="context.hasSave">Simpan</button>
            <button class="btn btn-danger" click.delegate="context.deleteCallback($event)" show.bind="!isUsed"
                if.one-way="context.hasDelete">Hapus</button>
        </div>

        <au-textbox label="No Bon Pengeluaran" value.bind="data.AvalExpenditureNo" read-only="true"
            options.bind="controlOptions">
        </au-textbox>

        <au-datepicker label="Tgl Pengeluaran Gudang" value.bind="data.ExpenditureDate"
            error.bind="error.ExpenditureDate" read-only.bind="readOnly" options.bind="controlOptions">
        </au-datepicker>

        <au-dropdown label="Tipe Aval" value.bind="data.AvalType" error.bind="error.AvalType"
            read-only.bind="readOnly || isEdit" items.bind="avalTypes" options.bind="controlOptions">
        </au-dropdown>

        <au-autocomplete label="No Bon DO Sisa" value.bind="selectedGLDO" read-only.bind="readOnly || isEdit"
            error.bind="error.DONo"
            loader.bind="garmentLeftoverWarehouseDeliveryOrderLoader" query.bind="gldoFilter" text.bind="gldoView"
            options.bind="controlOptions">
        </au-autocomplete>

        <au-textbox label="Tujuan Pengeluaran" value.bind="data.ExpenditureTo" read-only.bind="true"
            options.bind="controlOptions">
        </au-textbox>

        <!-- <au-autocomplete label="Unit Tujuan" placeholder="Pilih Unit" value.bind="selectedUnit"
            error.bind="error.ExpenditureTo" read-only.bind="true"
            options.bind="controlOptions" if.bind="data.ExpenditureTo == 'UNIT'" view-model.ref="selectedUnitViewModel">
        </au-autocomplete> -->

        <au-autocomplete label="Buyer" placeholder="Pilih Buyer" value.bind="selectedBuyer" error.bind="error.Buyer"
            text.bind="buyerView" if.bind="data.ExpenditureTo=='JUAL LOKAL'"
            read-only.bind="true" options.bind="controlOptions">
        </au-autocomplete>

        <au-autocomplete label="No Nota Penjualan Lokal" value.bind="selectedSalesNote" text="noteNo"
            if.bind="data.ExpenditureDestination == 'JUAL LOKAL'" read-only.bind="true" options.bind="controlOptions">
        </au-autocomplete>

        <au-textbox label="Keterangan Lain-lain" value.bind="data.OtherDescription" error.bind="error.OtherDescription"
            read-only.bind="true" options.bind="controlOptions" if.bind="data.ExpenditureTo=='LAIN-LAIN'">
        </au-textbox>

        <au-multiline label="Keterangan" placeholder="Masukkan Keterangan" value.bind="data.Description"
            read-only.bind="true" options.bind="controlOptions">
        </au-multiline>

        <div class="form-group has-error">
            <p if.bind="error.ItemsCount" class="help-block text-center">${error.ItemsCount}</p>
        </div>

        <au-collection items.bind="data.Items" errors.bind="error.Items"
            columns.bind="viewItemsColumnsFabric" read-only.bind="true"
            options.bind="Options"
            if.bind="data.AvalType!='AVAL BAHAN PENOLONG'"
            item-template="modules/inventory/garment-leftover-warehouse/expenditure/aval/template/item">
        </au-collection>

        <au-collection items.bind="data.Items" errors.bind="error.Items"
            columns.bind="viewItemsColumnsAcc" read-only.bind="true"
            options.bind="Options"
            if.bind="data.AvalType=='AVAL BAHAN PENOLONG'"
            item-template="modules/inventory/garment-leftover-warehouse/expenditure/aval/template/item-accessories">
        </au-collection>

    </au-input-form>
</template>
