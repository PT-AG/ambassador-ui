<template>
    <au-input-form title.bind="title" with.bind="context">
        <au-textbox label="No DO Gudang Sisa" value.bind="data.DONo" read-only="true" options.bind="controlOptions"
            if.bind="readOnly || isEdit">
        </au-textbox>

        <au-datepicker label="Tgl DO Gudang Sisa" value.bind="data.DODate" error.bind="error.DODate"
            read-only.bind="readOnly" options.bind="controlOptions">
        </au-datepicker>

        <au-dropdown label="Jenis Pengeluaran" items.bind="expenditureTypes" value.bind="data.ExpenditureType"
            error.bind="error.ExpenditureType" read-only.bind="readOnly || isEdit" options.bind="controlOptions"
            change.delegate="expenditureTypesChanged($event)">
        </au-dropdown>

        <au-dropdown label="Tipe Aval" value.bind="data.AvalType" error.bind="error.AvalType"
            read-only.bind="readOnly || isEdit" items.bind="avalTypes" if.bind="data.ExpenditureType == 'AVAL'"
            options.bind="controlOptions"
            change.delegate="selectedAvalTypeChanged($event)">
        </au-dropdown>

        <au-dropdown label="Tujuan Pengeluaran" items.bind="expenditureDestinationTemp" value.bind="data.ExpenditureTo"
            error.bind="error.ExpenditureTo" read-only.bind="readOnly || isEdit" options.bind="controlOptions"
            change.delegate="expenditureDestinationsChanged($event)">
        </au-dropdown>

        <au-autocomplete label="Unit Tujuan" placeholder="Pilih Unit" value.bind="selectedUnit"
            error.bind="error.UnitExpenditure" loader.bind="unitLoader" text.bind="unitView"
            read-only.bind="readOnly || isEdit" options.bind="controlOptions" show.bind="data.ExpenditureTo == 'UNIT'"
            view-model.ref="selectedUnitViewModel">
        </au-autocomplete>

        <au-autocomplete label="Buyer" placeholder="Pilih Buyer" value.bind="selectedBuyer" error.bind="error.Buyer"
            loader.bind="buyerLoader" text.bind="buyerView" read-only.bind="readOnly || isEdit"
            options.bind="controlOptions" show.bind="data.ExpenditureTo == 'JUAL LOKAL'"
            view-model.ref="selectedBuyerViewModel">
        </au-autocomplete>

        <au-checkbox label="Manual?" value.bind="manual" change.delegate="manualChanged($event)" if.bind="!readOnly"
            read-only.bind="readOnly" options.bind="controlOptions"
            show.bind="data.ExpenditureTo == 'JUAL LOKAL' && isCreate">
        </au-checkbox>

        <au-textbox value.bind="data.LocalSalesNoteNo" error.bind="error.LocalSalesNoteNo"
            label="No Nota Penjualan Lokal" read-only.bind="readOnly || isEdit" if.bind="manual && data.ExpenditureTo == 'JUAL LOKAL'"
            options.bind="controlOptions">
        </au-textbox>

        <au-autocomplete label="No Nota Penjualan Lokal" placeholder="Pilih Nota Penjualan Lokal"
            error.bind="error.LocalSalesNoteNo" loader.bind="localSalesNoteLoader" value.bind="selectedSalesNote"
            text="noteNo" if.bind="data.ExpenditureTo == 'JUAL LOKAL' && !manual" read-only.bind="readOnly || isEdit"
            options.bind="controlOptions">
        </au-autocomplete>

        <au-textbox label="Keterangan Lain-lain" placeholder="Masukkan Keterangan" value.bind="data.EtcRemark"
            error.bind="error.EtcRemark" read-only.bind="readOnly || isEdit" options.bind="controlOptions"
            show.bind="data.ExpenditureTo == 'LAIN-LAIN'">
        </au-textbox>

        <au-checkbox label="Titip Jual" value.bind="data.Consignment" read-only.bind="readOnly" options.bind="controlOptions"
            if.bind="data.ExpenditureType == 'BARANG JADI'">
        </au-checkbox>

        <au-multiline label="Keterangan" placeholder="Masukkan Keterangan" value.bind="data.Remark"
            read-only.bind="readOnly" options.bind="controlOptions">
        </au-multiline>

        <au-textbox error.bind="error.ItemsCount" read-only.bind="true" show.bind="error.ItemsCount"
            options.bind="controlOptions">
        </au-textbox>

        <au-collection columns.bind="items.columns" items.bind="data.Items" errors.bind="error.Items"
            add.bind="items.onAdd" read-only.bind="readOnly" options.bind="items.options"
            if.bind="data.ExpenditureType == 'FABRIC'"
            item-template="modules/inventory/garment-leftover-warehouse/delivery-order/template/fabric/item">
        </au-collection>

        <au-collection columns.bind="items.columns" items.bind="data.Items" errors.bind="error.Items" add.bind="items.onAdd"
            read-only.bind="readOnly" options.bind="items.options" if.bind="data.ExpenditureType == 'ACCESSORIES'"
            item-template="modules/inventory/garment-leftover-warehouse/delivery-order/template/acc/item">
        </au-collection>
        
        <au-collection items.bind="data.Items" errors.bind="error.Items" columns.bind="items.columns" read-only.bind="readOnly"
            add.bind="addItems" remove.bind="removeItems" options.bind="Options"
            if.bind="data.ExpenditureType == 'AVAL' && data.AvalType !='AVAL BAHAN PENOLONG'"
            item-template="modules/inventory/garment-leftover-warehouse/delivery-order/template/aval/item">
        </au-collection>
        
        <au-collection items.bind="data.Items" errors.bind="error.Items" columns.bind="items.columns" read-only.bind="readOnly"
            add.bind="addItems" remove.bind="removeItems" options.bind="Options"
            if.bind="data.ExpenditureType == 'AVAL' && data.AvalType =='AVAL BAHAN PENOLONG'"
            item-template="modules/inventory/garment-leftover-warehouse/delivery-order/template/aval/item-accessories">
        </au-collection>

        <au-collection items.bind="data.Items" errors.bind="error.Items"
            columns.bind="items.columns" read-only.bind="readOnly" add.bind="addItems"
            remove.bind="removeItems" options.bind="Options"
            if.bind="data.ExpenditureType == 'BARANG JADI'"
            item-template="modules/inventory/garment-leftover-warehouse/delivery-order/template/finished-goods/item">
        </au-collection>

        <div class="col-md-4">
            <au-numeric label="Jumlah Keluar (Kg)" error.bind="error.QtyKG" options.bind="controlOptions"
                value.bind="data.QtyKG" read-only.bind="readOnly" format="0.00"
                if.bind="data.ExpenditureType == 'FABRIC'">
            </au-numeric>
        </div>
    </au-input-form>
</template>
