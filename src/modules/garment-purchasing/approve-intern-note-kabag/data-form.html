<template>
    <au-input-form title.bind="title" with.bind="context">
        <div slot="actions" class="btn-group">
            <button class="btn btn-default" click.delegate="context.cancel($event)" if.one-way="context.hasCancel">Kembali</button>
            <button class="btn btn-primary" click.delegate="context.approve($event)" if.one-way="context.hasApprove">Approve</button>
            <button class="btn btn-danger" click.delegate="context.reject($event)" if.one-way="context.hasReject">Reject</button>
        </div>

        <au-textbox label="No. Nota Intern" value.bind="data.inNo" error.bind="error.no" read-only.bind="true" if.bind="readOnly || isEdit"
            options.bind="auInputOptions">
        </au-textbox>

        <au-datepicker label="Tgl. Nota Intern" value.bind="data.inDate" error.bind="error.date" read-only.bind="true" if.bind="(readOnly || isEdit)"
            options.bind="auInputOptions">
        </au-datepicker>

        <au-autocomplete value.bind="currency" error.bind="error.currency" label="Mata Uang" loader.bind="currencyLoader" text.bind="currencyView"
            placeholder="cari mata uang" read-only.bind="readOnly || isEdit" options.bind="auInputOptions">
        </au-autocomplete>

        <au-autocomplete value.bind="supplier" view-model.ref="ItemsCollection" error.bind="error.supplier" label="Supplier" loader.bind="supplierLoader"
            text.bind="supplierView" read-only.bind="readOnly || isEdit" placeholder="cari supplier" show.bind="data.currency" options.bind="auInputOptions">
        </au-autocomplete>

        <au-multiline label="Keterangan" value.bind="data.remark" error.bind="error.remark" read-only.bind="readOnly" placeholder="tambah keterangan"
            options.bind="auInputOptions">
        </au-multiline>

        <au-textbox 
                    label="Admin Pembelian" 
                    value.bind="data.CreatedBy" 
                    error.bind="error.CreatedBy" 
                    read-only.bind="true"
                    if.bind="(readOnly || isEdit)"
                    options.bind="auInputOptions">
        </au-textbox>

        <div class="row">
      <div class="col-md-6">
        <h4>File Dokumen</h4>
        <table class="table table-hover table-bordered">
          <thead>
            <th class="col-md-11">File</th>
            <th if.bind="!readOnly" class="col-md-1">
              <button click.delegate="onAddDocument()" class="btn btn-success pull-right">+</button>
            </th>
          </thead>
          <tbody>
            <tr if.bind="!data.DocumentsFileName || data.DocumentsFileName.length < 1">
              <td colspan="2">
                Tidak ada file
              </td>
            </tr>
            <tr if.bind="data.DocumentsFileName" repeat.for="doc of data.DocumentsFileName">
              <td if.bind="readOnly">
                <button class="btn btn-primary justify-content-center"
                  click.delegate="downloadDocument($index)">${doc}</button>
                  <button type="button" class="btn btn-info ml-2"
                click.delegate="previewDocument($index)">Preview</button>
              </td>
              <td if.bind="!readOnly">
                <input if.bind="!documentsPathTemp[$index]" type="file" id="documentInput${$index}"
                  value.bind="documentUpload" change.delegate="documentInputChanged($index)"
                  accept=".pdf, .xls, .xlsx, .doc, .docx">
                <button if.bind="documentsPathTemp[$index]" class="btn btn-primary justify-content-center"
                  click.delegate="downloadDocument($index)">${doc}</button>
                <span class="text-danger" if.bind="error.DocumentsFile[$index]">${error.DocumentsFile[$index]}</span>
              </td>
              <td if.bind="!readOnly">
                <button class="btn btn-danger pull-right" click.delegate="onRemoveDocument($index)">-</button>
                
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- PDF Preview Modal -->
      <div class="modal fade" id="pdfPreviewModal" tabindex="-1" role="dialog" aria-labelledby="previewModalLabel">
        <div class="modal-dialog" role="document">
          <div class="modal-content">
          
            <div class="resize-handle resize-n" data-direction="n"></div>
            <div class="resize-handle resize-s" data-direction="s"></div>
            <div class="resize-handle resize-e" data-direction="e"></div>
            <div class="resize-handle resize-w" data-direction="w"></div>
            <div class="resize-handle resize-ne" data-direction="ne"></div>
            <div class="resize-handle resize-nw" data-direction="nw"></div>
            <div class="resize-handle resize-se" data-direction="se"></div>
            <div class="resize-handle resize-sw" data-direction="sw"></div>
            
            <div class="modal-header">
              <h5 class="modal-title" id="previewModalLabel">Preview</h5>
              <span class="preview-size-indicator">
                Lebar: ${previewWidth}% | Tinggi: ${previewHeight}px
              </span>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body">
              <embed id="pdfEmbed" width="100%" type="application/pdf" style="display: none;" css="height: ${previewHeight}px">
              <div id="excelTable" style="display: none; overflow-y: auto;" css="max-height: ${previewHeight}px"></div>
              <img id="imagePreview" style="display: none; max-width: 100%;" css="max-height: ${previewHeight}px">
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>

        <au-textbox
            show.bind="error.itemscount"
            error.bind="error.itemscount"
            read-only="true">
        </au-textbox>

        <au-collection items.bind="data.items" show.bind="data.supplier.Id" options.bind="options" columns.bind="invoiceNoteItem.columns"
            errors.bind="error.items" read-only.bind="readOnly" add.bind="invoiceNoteItem.onAdd" view-model.ref="ItemsCollection"
            item-template="modules/garment-purchasing/intern-note/template/intern-note-item">
        </au-collection>
    </au-input-form>
</template>
